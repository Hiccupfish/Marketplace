<section class="reported-listings">
  <h2 class="section-title">Reported Listings</h2>
  <div class="table-wrapper">
    <table class="reports-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Title</th>
          <th>Reason</th>
          <th>Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let listing of listings" [class.resolved]="listing.status === 'Resolved'" (click)="select(listing)">
          <td>{{ listing.id }}</td>
          <td>{{ listing.title }}</td>
          <td>{{ listing.reportReason }}</td>
          <td>{{ listing.date | date:'short' }}</td>
          <td>{{ listing.status }}</td>
          <td>
            <button *ngIf="listing.status !== 'Resolved'" class="resolve-btn" (click)="resolve(listing.id); $event.stopPropagation()">
              Resolve
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <p *ngIf="listings.length === 0" class="empty-state">No reported listings.</p>
  </div>
</section>

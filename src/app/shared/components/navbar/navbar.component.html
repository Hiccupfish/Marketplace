<nav class="navbar">
  <!-- Brand -->
  <div class="navbar__brand" routerLink="/">
    {{ brand }}
  </div>

  <!-- Search -->
  <div class="navbar__search">
    <input
      type="text"
      placeholder="Search services, products..."
      [(ngModel)]="searchQuery"
      (keyup.enter)="onSearch()"
    />
  </div>

  <!-- Links -->
  <div class="navbar__links">
    <a routerLink="/">Home</a>
    <a routerLink="/listings">Browse</a>
    <a routerLink="/listings/create">Sell</a>
  </div>

  <!-- Auth -->
  <div class="navbar__auth">
    <button *ngIf="!isLoggedIn" routerLink="/auth/login">
      Login
    </button>

    <button *ngIf="!isLoggedIn" routerLink="/auth/register">
      Register
    </button>

    <div *ngIf="isLoggedIn" class="navbar__profile">
      <span>{{ userName }}</span>
      <button type="button" (click)="logout()">Logout</button>
    </div>
  </div>
</nav>

<div class="search-bar">

  <input
    class="search-bar__input"
    type="search"
    [value]="value"
    (input)="onInput($event)"
    placeholder="Search services, products, or sellers..."
  />

  <button
    class="search-bar__button"
    type="button"
    (click)="onSearch()"
  >
    Search
  </button>

</div>

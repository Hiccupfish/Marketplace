<article class="listing-card">

  <!-- Image -->
  <div class="listing-card__image">
    <img [src]="listing?.imageUrl || 'assets/placeholder-listing.svg'" alt="Listing image" />
  </div>

  <!-- Content -->
  <div class="listing-card__content">

    <h3 class="listing-card__title">
      {{ listing?.title || 'Listing title' }}
    </h3>

    <p class="listing-card__location">
      {{ listing?.city || 'Location' }}
    </p>

    <p class="listing-card__price">
      {{ listing?.priceZar ? 'R ' + listing.priceZar : 'Price on request' }}
    </p>

    <!-- Trust indicators -->
    <div class="listing-card__meta">

      <span class="listing-card__rating">
        {{ listing?.rating || 0 }} stars
      </span>

      <span
        class="listing-card__verified"
        *ngIf="listing?.isVerified"
      >
        Verified
      </span>

    </div>

  </div>

</article>
